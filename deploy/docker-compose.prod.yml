services:
  mysql:
    image: mysql:8.0
    container_name: anime-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-anime_platform}
    volumes:
      - ../data/mysql:/var/lib/mysql
    restart: always
    networks:
      - anime-network
  redis:
    image: redis:alpine
    container_name: anime-redis
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data
    restart: always
    networks:
      - anime-network

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: anime-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    volumes:
      - ../data/nacos:/home/nacos/data
    restart: always
    networks:
      - anime-network

  gateway:
    build: ../gateway
    image: anime-gateway:${TAG:-latest}
    container_name: anime-gateway
    ports:
      - "8080:8080"
    depends_on:
      - nacos
      - mysql
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=nacos:8848
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=anime_platform
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always
    networks:
      - anime-network

  anime-service:
    build: ../anime-service
    image: anime-service:${TAG:-latest}
    container_name: anime-service
    depends_on:
      - nacos
      - mysql
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=nacos:8848
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=anime_platform
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always
    networks:
      - anime-network

  user-service:
    build: ../user-service
    image: user-service:${TAG:-latest}
    container_name: user-service
    depends_on:
      - nacos
      - mysql
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=nacos:8848
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=anime_platform
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always
    networks:
      - anime-network

  video-service:
    build: ../video-service
    image: video-service:${TAG:-latest}
    container_name: video-service
    depends_on:
      - nacos
      - mysql
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=nacos:8848
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=anime_platform
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always
    networks:
      - anime-network

  danmaku-service:
    build: ../danmaku-service
    image: danmaku-service:${TAG:-latest}
    container_name: danmaku-service
    depends_on:
      - nacos
      - mysql
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=nacos:8848
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=anime_platform
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always
    networks:
      - anime-network

networks:
  anime-network:
    driver: bridge
