# docker-compose.yml
# 使用 host 网络模式，容器直接共享宿主机网络栈

services:
  gateway:
    build: ./gateway
    container_name: anime-gateway
    # 无需 ports 映射，容器端口直接暴露在宿主机上
    network_mode: host
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=127.0.0.1:8848
      - SPRING_DATA_REDIS_HOST=127.0.0.1
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=xT9#mK2$pLqR5@nV7&wYz3!   # 修正拼写 POSSWORD -> PASSWORD
    restart: unless-stopped

  anime-service:
    build: ./anime-service
    container_name: anime-anime-service
    network_mode: host
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=127.0.0.1:8848
      - SPRING_DATASOURCE_URL=jdbc:mysql://127.0.0.1:3306/animedb?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=docker_user
      - SPRING_DATASOURCE_PASSWORD=v7#Kp9$zL2@XmQ5
      - SPRING_DATA_REDIS_HOST=127.0.0.1
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=xT9#mK2$pLqR5@nV7&wYz3!
    restart: unless-stopped

