# docker-compose.yml
# 使用 host 网络模式，容器直接共享宿主机网络栈
# 所有服务的数据库、Redis 等配置均从 Nacos 配置中心获取

services:
  gateway:
    build: ./gateway
    container_name: anime-gateway
    network_mode: host
    env_file:
      - .env
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_SERVER_ADDR}
    restart: unless-stopped

  admin-service:
    build: ./admin-service
    container_name: anime-admin-service
    network_mode: host
    env_file:
      - .env
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_SERVER_ADDR}
    restart: unless-stopped

  anime-service:
    build: ./anime-service
    container_name: anime-anime-service
    network_mode: host
    env_file:
      - .env
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_SERVER_ADDR}
    restart: unless-stopped

  user-service:
    build: ./user-service
    container_name: anime-user-service
    network_mode: host
    env_file:
      - .env
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_SERVER_ADDR}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
    restart: unless-stopped

  video-service:
    build: ./video-service
    container_name: anime-video-service
    network_mode: host
    env_file:
      - .env
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_SERVER_ADDR}
    restart: unless-stopped

  danmaku-service:
    build: ./danmaku-service
    container_name: anime-danmaku-service
    network_mode: host
    env_file:
      - .env
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_SERVER_ADDR}
    restart: unless-stopped

  crawler-service:
    build: ./crawler-service
    container_name: anime-crawler-service
    network_mode: host
    env_file:
      - .env
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_SERVER_ADDR}
      - CRAWLER_ENABLED=${CRAWLER_ENABLED}
      - CRAWLER_CRON_JAPAN=${CRAWLER_CRON_JAPAN}
      - CRAWLER_CRON_OTHER=${CRAWLER_CRON_OTHER}
    restart: unless-stopped
