server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: gateway
  codec:
    max-in-memory-size: 500MB
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**, /api/user/**, /api/favorite/**

        - id: anime-service
          uri: lb://anime-service
          predicates:
            - Path=/api/anime/**, /api/recommend/**, /api/search/**,/api/history/**,/api/access/data/**

        - id: video-service
          uri: lb://video-service
          predicates:
            - Path=/api/video/**

        - id: danmaku-service
          uri: lb:ws://danmaku-service
          predicates:
            - Path=/ws/**

        - id: danmaku-api
          uri: lb://danmaku-service
          predicates:
            - Path=/api/danmaku/**

        - id: crawler-service
          uri: lb://crawler-service
          predicates:
            - Path=/api/crawler/**

        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
          metadata:
            response-timeout: 300000  # 5分钟超时，适用于大文件上传
            connect-timeout: 30000    # 30秒连接超时
      httpclient:
        connect-timeout: 30000        # 全局连接超时30秒
        response-timeout: 300000      # 全局响应超时5分钟，适用于大文件上传
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "https://www.animeparadise.vip"
              - "https://animeparadise.vip"
              - "http://www.animeparadise.vip"
              - "http://animeparadise.vip"
              - "https://lsj.animeparadise.vip"
              - "http://lsj.animeparadise.vip"
              - "http://localhost"
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:3002"
              - "http://127.0.0.1"
              - "http://127.0.0.1:5173"
              - "http://127.0.0.1:3000"
              - "http://127.0.0.1:3001"
              - "http://127.0.0.1:3002"
              - "http://192.168.31.39:5173"
              - "http://127.0.0.1:8080"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
logging:
  level:
    com.anime: debug