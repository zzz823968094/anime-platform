server:
  port: 8086
  tomcat:
    connection-timeout: 300000  # 5分钟连接超时，适用于大文件上传
    max-swallow-size: -1        # 不限制请求体大小
    async:
      request-timeout: 300000   # 异步请求超时5分钟
    threads:
      max: 200                  # 最大线程数
      min-spare: 20             # 最小空闲线程数
  servlet:
    session:
      timeout: 300s             # 会话超时5分钟

spring:
  application:
    name: admin-service
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

file:
  upload:
    path: /root/uploads/app-versions/
  access:
    url: https://www.animeparadise.vip/files/
#file:
#  upload:
#    path: F:\UpDateProject\uploads
#  access:
#    url: http://192.168.10.64:8086/files/

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
  mapper-locations: classpath:mapper/*.xml

logging:
  level:
    com.anime: debug
